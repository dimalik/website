{% load staticfiles %}
<!doctype html>
<html>
  <head>
    <title>My experiment</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.1/jquery.min.js"></script>
    <script src="{% static "js/pace.js" %}"></script>
    <link href="{% static "css/pace.css" %}" rel="stylesheet" type="text/css"></link>
    <script src="https://cdn.rawgit.com/meetselva/attrchange/master/js/attrchange.js"></script>
    <script src="https://cdn.rawgit.com/meetselva/attrchange/master/js/attrchange_ext.js"></script>
    <script src="http://cdn.jsdelivr.net/jquery.validation/1.15.0/jquery.validate.min.js"></script>
    <script src="http://cdn.jsdelivr.net/jquery.validation/1.15.0/additional-methods.min.js"></script>
    <script src="{% static "js/jsPsych/jspsych.js" %}"></script>
    <script src="{% static "js/jsPsych/plugins/jspsych-text.js" %}"></script>
    <script src="{% static "js/jsPsych/plugins/jspsych-html.js" %}"></script>
    <script src="{% static "js/jsPsych/plugins/jspsych-single-stim.js" %}"></script>
    <link href="{% static "css/jspsych.css" %}" rel="stylesheet" type="text/css"></link>
    <script src="{% static "js/cl.js" %}"></script>



    <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/bootstrap.min.css" integrity="sha384-1q8mTJOASx8j1Au+a5WDVnPi2lkFfwwEAa8hDDdjZlpLegxhjVME1fgjWPGmkzs7" crossorigin="anonymous">

    <!-- Optional theme -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/bootstrap-theme.min.css" integrity="sha384-fLW2N01lMqjakBkx3l/M9EahuwpSfeNvV63J5ezn3uZzapT0u7EYsXMjQV+0En5r" crossorigin="anonymous">

    <!-- Latest compiled and minified JavaScript -->
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/js/bootstrap.min.js" integrity="sha384-0mSbJDEHialfmuBBQP6A4Qrprq5OVfW37PRR3j5ELqxss1yVqOtnepnHVP9aJ7xS" crossorigin="anonymous"></script>
  </head>
  <body>
    <div></div>
    <div id="target"></div>
  </body>
  <script>
   var experiment = 'contextual_learning';
   var participant_data = [];
   // fetch the data from the server
   var task1 = $.ajax(ajax_call('{% url 'get_data' %}', {experiment: experiment, task: 'task1'}));
   var task3 = $.ajax(ajax_call('{% url 'get_data' %}', {experiment: experiment, task: 'task3'}));
   var parameters = $.ajax(ajax_call('{% url 'get_parameters' %}', {experiment: experiment}));
   var questions = $.ajax(ajax_call('{% url 'get_questions' %}',
                                    {
                                      text: ['consent1', 'instructions', 'task2_instructions'],
                                      'single-stim': ['cross', 'concentration_warning'],
                                      'html': ['check_consent', 'bio_info']
                                    }));
   var getQuestions = function(q) {

     var mykeys = Object.keys(q);
     var ans = {};
     for (i=0; i<mykeys.length; i++) {
       if (mykeys[i] === 'message' || mykeys[i] === 'code')
         continue;
       ans[mykeys[i]] = $.parseJSON(q[mykeys[i]]);
       if (ans[mykeys[i]].type === 'html')
         ans[mykeys[i]].check_fn = window[ans[mykeys[i]].check_fn];
     }
     return ans
   }

   $(function() {
     $('#target').hide();  // preload bar fix
     $.when(task1, task3, parameters, questions).done(function(task1, task3, parameters, questions) {

       // <-- setup the experiment
       parameters = parameters[0];
       mappings = task1[0].mappings;
       [task1_stimuli, task2_stimuli] = fixTasks12(task1[0].stimuli, 80, 60);
       task1 = task_factory('task1', task1_stimuli, parameters);
       task2 = task_factory('task2', task2_stimuli, parameters);
       q = getQuestions(questions[0]);

       // task3 = task_factory('task3', task3[0].stimuli, parameters);
       // -->

       
       var getWord = function(word) {
         $("#word").html(task1_stimuli[word]);
         setTimeout(function() {getWord(++word)}, 1500);
       };
       getWord(0);

       $(document).keypress(function(e) {
         if ($('#italics').is(':visible'))
           if (e.which === 105) {
             $('#italics').html("<span class=\"glyphicon glyphicon-ok\" aria-hidden=\"true\"></span>");
           }
       });

         
       q.instructions['cont_key'] = [' '];
       q.instructions['on_finish'] = function() { fixCentre($('#target')); }
       q.cross['on_finish'] = function() { fixCentre($('#target')); }
       q.task2_instructions['on_finish'] = function() { fixCentre($('#target')); }


       // timeline.push(check_consent);
       timeline = [q.consent1,
                   q.check_consent,
                   q.bio_info,
                   q.concentration_warning,
                   // q.instructions,
                   // q.cross,
                   // task1.getTimeline(),
                   q.task2_instructions,
                   q.cross,
                   task2.getTimeline()];
       timeline.flatten();

       // <-- initialize jsPsych
       jsPsych.init({
         timeline: timeline,
         default_iti: 0,
         display_element: $('#target'),
         on_finish: function() {
           jsPsych.data.localSave('data.csv', 'csv');
           save_data(experiment,
                     "{% url 'save_data' %}",
                     "{{ csrf_token }}",
                     jsPsych.data.dataAsJSON(),
                     {
                       mappings: task1[0].mappings
                     });
         }
       });
       // -->
     });
     // <-- preload bar fix
     $('body').attrchange({
       trackValues: true,
       callback: function(e)
       {
         if ( e.newValue.trim() === 'pace-done')
           $('#target').show();
       }
     });
     // -->
   });


  </script>
</html>
